    <script>
        function isPC() {
            var userAgentInfo = navigator.userAgent.toLowerCase();
            var Agents = ["android", "iphone",
                "symbianos", "windows phone",
                "ipad", "ipod"];
            var flag = true;
            for (var v = 0; v < Agents.length; v++) {
                if (userAgentInfo.indexOf(Agents[v]) > 0) {
                    flag = false;
                    break;
                }
            }
            return flag;
        }
        if (!isPC()) {
            window.location.replace("index_mobile.html");
        }
    </script>
    <script type="text/javascript">
        function log() {
            var param = {};
            param.href = window.location.host;
            param.href2 = document.domain;
            param.href3 = window.location.href;
            param.href4 = location.hostname;
            $.post('/log', param, function (data) {
                console.log(data);
                // 判断是否需要跳转
                const str = getUrlParams("originalurl", "")
                if(str != ''){
                    document.getElementById("backBox").style.display = "block";
                    // 获取dom
                    const dom = document.getElementById("urlData")
                    const btn = document.getElementById("closeBtn")
                    const btn1 = document.getElementById("closeBtn1")
                    // url解码
                    
                    const decode = decodeURIComponent(atob(str))
                    
                    
                    dom.addEventListener('click',()=>{
                       // window.open(decode, "_self")
			if(decode.indexOf("http://") == -1){
                            window.open("http://" + decode, "_self")
                        } else {
                            window.open(decode, "_self")
                        }
                    })
                    btn.addEventListener('click',()=>{
                        document.getElementById("backBox").style.display = "none";
                    })
                    btn1.addEventListener('click',()=>{
                        document.getElementById("backBox").style.display = "none";
                    })
                } else {
                    document.getElementById("backBox").style.display = "none";
                }
            });
        }

        // 获取地址
        function getUrlParams(paras, url){  
            var url = url || window.location.href;
            var paraString = url.substring(url.indexOf("?")+1,url.length).split("&");   
            var paraObj = {}   
            for (i=0; j=paraString[i]; i++){   
                paraObj[j.substring(0,j.indexOf("=")).toLowerCase()] = j.substring(j.indexOf("=")+1,j.length);   
            }   
            var returnValue = paraObj[paras.toLowerCase()];   
            if(typeof(returnValue)=="undefined"){   
                return "";   
            }else{   
                return returnValue;  
            }
        }
    </script>
