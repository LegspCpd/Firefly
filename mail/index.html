<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCmail 临时邮箱工具</title>
    <!-- 仅保留必要的基础样式，无复杂CSS -->
    <style>
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        button { margin: 5px 0; padding: 8px 16px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        #mailInfo, #messageList, #messageDetail { margin-top: 10px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LCmail 临时邮箱工具</h1>

        <!-- 1. 创建临时邮箱区域 -->
        <div class="section">
            <h2>1. 创建临时邮箱</h2>
            <button id="createMailboxBtn">创建新的临时邮箱</button>
            <div id="mailInfo" class="error"></div>
        </div>

        <!-- 2. 查看邮件列表区域 -->
        <div class="section">
            <h2>2. 查看收件箱</h2>
            <button id="getMessagesBtn" disabled>获取邮件列表</button>
            <div id="messageList"></div>
        </div>

        <!-- 3. 查看邮件详情区域 -->
        <div class="section">
            <h2>3. 邮件详情</h2>
            <div id="messageDetail"></div>
        </div>
    </div>

    <script>
        // 配置项
        const CONFIG = {
            API_KEY: 'vmail_uA9y7POGPvQZAd7U3EK21s1muv5WdBvy',
            BASE_URL: 'https://lcmail.cc.cd/api/v1'
        };

        // 全局变量存储当前邮箱ID
        let currentMailboxId = '';

        // 工具函数：处理API请求
        async function requestApi(url, method = 'GET', data = null) {
            const headers = {
                'X-API-Key': CONFIG.API_KEY,
                'Content-Type': 'application/json'
            };

            const options = {
                method,
                headers
            };

            // POST/PUT 请求添加请求体
            if (data && (method === 'POST' || method === 'PUT')) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();

                // 处理错误响应
                if (!response.ok) {
                    throw new Error(result.error?.message || `请求失败: ${response.status}`);
                }

                return result;
            } catch (error) {
                throw new Error(`API请求错误: ${error.message}`);
            }
        }

        // 1. 创建临时邮箱
        document.getElementById('createMailboxBtn').addEventListener('click', async () => {
            const mailInfoEl = document.getElementById('mailInfo');
            mailInfoEl.className = 'error';
            
            try {
                mailInfoEl.textContent = '正在创建邮箱...';
                // 调用创建邮箱API（可自定义localPart/domain，这里用默认）
                const result = await requestApi(`${CONFIG.BASE_URL}/mailboxes`, 'POST', {
                    // 可选自定义配置：
                    // localPart: 'mycustommail',
                    // domain: 'example.com',
                    // expiresIn: 86400
                });

                // 存储邮箱ID，启用获取邮件按钮
                currentMailboxId = result.data.id;
                document.getElementById('getMessagesBtn').disabled = false;

                // 显示邮箱信息
                mailInfoEl.className = '';
                mailInfoEl.innerHTML = `
                    <strong>邮箱创建成功！</strong><br>
                    邮箱地址: ${result.data.address}<br>
                    过期时间: ${new Date(result.data.expiresAt).toLocaleString()}<br>
                    邮箱ID: ${result.data.id}<br>
                    <small>请使用该邮箱地址接收邮件，点击下方按钮刷新收件箱</small>
                `;
            } catch (error) {
                mailInfoEl.textContent = error.message;
            }
        });

        // 2. 获取邮件列表
        document.getElementById('getMessagesBtn').addEventListener('click', async () => {
            const messageListEl = document.getElementById('messageList');
            messageListEl.innerHTML = '正在获取邮件列表...';

            if (!currentMailboxId) {
                messageListEl.textContent = '错误：请先创建临时邮箱';
                return;
            }

            try {
                // 调用获取邮件列表API（分页参数默认page=1&limit=20&sort=desc）
                const result = await requestApi(`${CONFIG.BASE_URL}/mailboxes/${currentMailboxId}/messages`);

                if (result.data.length === 0) {
                    messageListEl.textContent = '暂无邮件，请向该邮箱发送邮件后重试';
                    return;
                }

                // 渲染邮件列表（点击邮件可查看详情）
                messageListEl.innerHTML = `
                    <strong>共 ${result.pagination.total} 封邮件</strong><br>
                    <ul>
                        ${result.data.map(msg => `
                            <li style="margin: 10px 0; padding: 5px; border-bottom: 1px solid #eee;">
                                <button onclick="viewMessageDetail('${msg.id}')">查看详情</button>
                                发件人: ${msg.from.name || msg.from.address} <br>
                                主题: ${msg.subject} <br>
                                接收时间: ${new Date(msg.receivedAt).toLocaleString()} <br>
                                预览: ${msg.preview}
                            </li>
                        `).join('')}
                    </ul>
                    <small>分页：第 ${result.pagination.page} 页 / 共 ${result.pagination.totalPages} 页</small>
                `;
            } catch (error) {
                messageListEl.textContent = error.message;
            }
        });

        // 3. 查看邮件详情
        window.viewMessageDetail = async (messageId) => {
            const messageDetailEl = document.getElementById('messageDetail');
            messageDetailEl.innerHTML = '正在获取邮件详情...';

            if (!currentMailboxId) {
                messageDetailEl.textContent = '错误：请先创建临时邮箱';
                return;
            }

            try {
                const result = await requestApi(`${CONFIG.BASE_URL}/mailboxes/${currentMailboxId}/messages/${messageId}`);
                const msg = result.data;

                // 渲染邮件详情（包含文本/HTML内容）
                messageDetailEl.innerHTML = `
                    <h3>邮件详情</h3>
                    <div><strong>邮件ID：</strong>${msg.id}</div>
                    <div><strong>发件人：</strong>${msg.from.name || msg.from.address}</div>
                    <div><strong>收件人：</strong>${msg.to.map(t => t.address).join(', ')}</div>
                    <div><strong>主题：</strong>${msg.subject}</div>
                    <div><strong>接收时间：</strong>${new Date(msg.receivedAt).toLocaleString()}</div>
                    <div><strong>文本内容：</strong><pre>${msg.text || '无'}</pre></div>
                    <div><strong>HTML内容：</strong><div>${msg.html || '无'}</div></div>
                `;
            } catch (error) {
                messageDetailEl.textContent = error.message;
            }
        };
    </script>
</body>
</html>
